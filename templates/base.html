{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My Blog{% endblock %}</title>
    <link rel="stylesheet" type="text/css" href="{% static 'posts/style.css' %}">

<style>
 
  
        /* ============================================
           GLOBAL STYLES (Sab Pages Ke Liye Common)
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            padding: 40px 35px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* ============================================
           NAVIGATION (Base)
           ============================================ */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .nav h1 {
            font-size: 24px;
            margin: 0;
            color: white;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255,255,255,0.15);
            transition: background 0.3s;
            font-weight: 500;
        }

        .nav a:hover {
            background: rgba(255,255,255,0.3);
        }

        .nav .logout-btn {
            background: rgba(255, 0, 0, 0.3);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .nav .logout-btn:hover {
            background: rgba(255, 0, 0, 0.5);
        }

        .nav .welcome {
            color: white;
            font-weight: 500;
        }

        /* ============================================
           COMMON BUTTONS
           ============================================ */
        .btn {
            display: inline-block;
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }
        .btn-success:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .btn-warning {
            background: #ed8936;
            color: white;
        }
        .btn-warning:hover {
            background: #dd6b20;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #fc8181;
            color: white;
        }
        .btn-danger:hover {
            background: #f56565;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        .btn-back {
            background: #e2e8f0;
            color: #2d3748;
        }
        .btn-back:hover {
            background: #cbd5e0;
            transform: translateY(-2px);
        }

        /* ============================================
           SEARCH FORM (Homepage)
           ============================================ */
        .search-form {
            display: flex;
            gap: 12px;
            margin-bottom: 35px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-form input[type="text"],
        .search-form select {
            padding: 12px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            background: white;
            flex: 1;
            min-width: 180px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .search-form input:focus,
        .search-form select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .search-form button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .search-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        /* ============================================
           POSTS GRID (Homepage)
           ============================================ */
        .posts-grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
            margin-top: 10px;
        }

        .post {
            background: white;
            padding: 24px 28px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-left: 6px solid #667eea;
            transition: transform 0.25s, box-shadow 0.25s;
        }

        .post:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.10);
        }

        .post h2 {
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 6px;
        }

        .post .author {
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
        }

        .post .content {
            font-size: 16px;
            color: #4a5568;
            line-height: 1.7;
            margin: 12px 0 8px 0;
        }

        .post .meta {
            font-size: 13px;
            color: #a0aec0;
            margin-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 12px;
        }

        .post .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        /* ============================================
           PAGE TITLE
           ============================================ */
        .page-title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 30px;
        }

        /* ============================================
           CREATE / EDIT FORM
           ============================================ */
        .form-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .form-container h2 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-container form {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid #f0f0f0;
        }

        .form-container form label {
            display: block;
            font-weight: 600;
            color: #2d3748;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .form-container form input,
        .form-container form textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            box-sizing: border-box;
            background: #fafafa;
        }

        .form-container form input:focus,
        .form-container form textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background: white;
        }

        .form-container form textarea {
            min-height: 200px;
            resize: vertical;
        }

        .form-container .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .form-container .btn-save,
        .form-container .btn-update {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 40px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .form-container .btn-save:hover,
        .form-container .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .form-container .btn-cancel {
            background: #e2e8f0;
            color: #333;
            padding: 12px 35px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }

        .form-container .btn-cancel:hover {
            background: #cbd5e0;
        }

        .form-container .errorlist {
            color: #e53e3e;
            background: #fff5f5;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            margin: 5px 0 10px 0;
            list-style: none;
        }

        /* ============================================
           DETAIL PAGE
           ============================================ */
        .detail-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .detail-container .post-header {
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .detail-container h1 {
            font-size: 32px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 12px;
        }

        .detail-container .author-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 5px;
        }

        .detail-container .author-name {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
        }

        .detail-container .post-meta {
            font-size: 14px;
            color: #a0aec0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-container .post-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-left: 6px solid #667eea;
            margin-bottom: 30px;
            line-height: 1.8;
            font-size: 18px;
            color: #2d3748;
        }

        .detail-container .post-content p {
            margin-bottom: 16px;
        }

        .detail-container .post-content p:last-child {
            margin-bottom: 0;
        }

        .detail-container .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .detail-container .delete-form {
            display: inline;
            margin: 0;
        }

        /* ============================================
           DELETE CONFIRM PAGE
           ============================================ */
        .delete-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            padding: 20px 0;
        }

        .delete-container .delete-box {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 2px solid #fc8181;
        }

        .delete-container h1 {
            color: #e53e3e;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .delete-container .post-title {
            font-size: 22px;
            font-weight: 700;
            color: #2d3748;
            margin: 15px 0;
        }

        .delete-container .warning {
            color: #e53e3e;
            font-weight: 500;
            margin: 15px 0;
        }

        .delete-container .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        /* ============================================
           RESPONSIVE (Mobile)
           ============================================ */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            .nav {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .nav-right {
                justify-content: center;
                margin-top: 10px;
            }
            .search-form {
                flex-direction: column;
            }
            .search-form input,
            .search-form select,
            .search-form button {
                width: 100%;
                min-width: unset;
            }
            .post {
                padding: 18px 16px;
            }
            .post h2 {
                font-size: 20px;
            }
            .page-title {
                font-size: 26px;
            }
            .posts-grid {
                gap: 20px;
            }
            .form-container form {
                padding: 20px;
            }
            .form-container .form-actions {
                flex-direction: column;
            }
            .form-container .btn-save,
            .form-container .btn-update,
            .form-container .btn-cancel {
                width: 100%;
                text-align: center;
            }
            .detail-container h1 {
                font-size: 26px;
            }
            .detail-container .post-content {
                padding: 20px;
                font-size: 16px;
            }
            .detail-container .author-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            .detail-container .action-buttons {
                flex-direction: column;
            }
            .detail-container .btn {
                width: 100%;
                text-align: center;
            }
            .detail-container .delete-form {
                display: block;
                width: 100%;
            }
            .detail-container .delete-form button {
                width: 100%;
            }
            .delete-container .delete-box {
                padding: 25px 20px;
            }
            .delete-container .action-buttons {
                flex-direction: column;
            }
            .delete-container .action-buttons .btn {
                width: 100%;
                text-align: center;
            }
        }
</style>



</head>

<body>
    <div class="container">
        <!-- Navigation -->
        <div class="nav">
            <h1>📝 My Blog</h1>
            <div class="nav-right">
                {% if user.is_authenticated %}
                    <span class="welcome">👋 Welcome, {{ user.username }}!</span>
                    <a href="{% url 'create_post' %}" class="btn btn-primary" style="background: rgba(255,255,255,0.2);">+ New Post</a>
                    <form action="{% url 'logout' %}" method="POST" style="display: inline; margin: 0;">
                        {% csrf_token %}
                        <button type="submit" class="logout-btn">🚪 Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">🔑 Login</a>
                {% endif %}
            </div>
        </div>

        <!-- Content -->
        {% block content %}{% endblock %}
    </div>
</body>
</html>
