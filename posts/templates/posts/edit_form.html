{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Post{% endblock %}

{% block content %}
<h2 class="page-title">✏️ Edit Post</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="actions">
        <button type="submit" class="btn btn-primary">✅ Update Post</button>
        <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline">Cancel</a>
    </div>
</form>
{% endblock %}
