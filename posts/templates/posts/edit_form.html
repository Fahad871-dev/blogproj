{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Post{% endblock %}

{% block content %}
<style>
    /* ===== EDIT POST PAGE STYLES ===== */
    .edit-container {
        max-width: 700px;
        margin: 0 auto;
        padding: 20px 0;
    }

    .edit-container h2 {
        color: #2d3748;
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 25px;
        text-align: center;
    }

    .edit-container form {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border: 1px solid #f0f0f0;
    }

    .edit-container form label {
        display: block;
        font-weight: 600;
        color: #2d3748;
        margin-top: 15px;
        margin-bottom: 5px;
        font-size: 14px;
        letter-spacing: 0.3px;
    }

    .edit-container form input,
    .edit-container form textarea {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-size: 16px;
        transition: all 0.3s;
        box-sizing: border-box;
        background: #fafafa;
    }

    .edit-container form input:focus,
    .edit-container form textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        background: white;
    }

    .edit-container form textarea {
        min-height: 200px;
        resize: vertical;
    }

    .edit-container .form-actions {
        display: flex;
        gap: 12px;
        margin-top: 25px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .edit-container .btn-update {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 12px 40px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .edit-container .btn-update:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .edit-container .btn-cancel {
        background: #e2e8f0;
        color: #333;
        padding: 12px 35px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        display: inline-block;
        transition: background 0.3s;
    }

    .edit-container .btn-cancel:hover {
        background: #cbd5e0;
    }

    .edit-container .errorlist {
        color: #e53e3e;
        background: #fff5f5;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 14px;
        margin: 5px 0 10px 0;
        list-style: none;
    }

    @media (max-width: 600px) {
        .edit-container form {
            padding: 20px;
        }
        .edit-container .form-actions {
            flex-direction: column;
        }
        .edit-container .btn-update,
        .edit-container .btn-cancel {
            width: 100%;
            text-align: center;
        }
    }
</style>

<div class="edit-container">
    <h2>✏️ Edit Post</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn-update">✅ Update Post</button>
            <a href="{% url 'post_detail' post.pk %}" class="btn-cancel">← Back to Post</a>
        </div>
    </form>
</div>
{% endblock %}
