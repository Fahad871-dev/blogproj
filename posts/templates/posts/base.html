<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My Blog{% endblock %}</title>
    <link rel="stylesheet" type="text/css" href="{% static 'posts/style.css' %}">

    <style>

/* General Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f4f9;
    color: #333;
    line-height: 1.6;
    padding: 20px;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

/* Header */
header {
    background: #2c3e50;
    color: white;
    padding: 20px;
    border-radius: 10px 10px 0 0;
    margin-bottom: 20px;
}

header h1 {
    margin: 0;
}

header a {
    color: white;
    text-decoration: none;
}

/* Navigation */
nav {
    background: #34495e;
    padding: 10px 20px;
    border-radius: 0 0 10px 10px;
    margin-bottom: 20px;
}

nav a {
    color: white;
    text-decoration: none;
    margin-right: 15px;
    padding: 5px 10px;
}

nav a:hover {
    background: #2c3e50;
    border-radius: 5px;
}

/* Posts Grid */
.posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.post-card {
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 20px;
    transition: transform 0.2s;
}

.post-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.post-card h3 {
    margin-bottom: 10px;
}

.post-card h3 a {
    color: #2c3e50;
    text-decoration: none;
}

.post-meta {
    color: #7f8c8d;
    font-size: 0.9em;
    margin-bottom: 10px;
}

.post-excerpt {
    color: #555;
}

/* Search Form */
.search-form {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.search-form input,
.search-form select {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
    flex: 1;
    min-width: 200px;
}

.search-form button {
    background: #2c3e50;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
}

.search-form button:hover {
    background: #34495e;
}

/* Page Title */
.page-title {
    margin-bottom: 20px;
    color: #2c3e50;
}

/* Footer */
footer {
    text-align: center;
    margin-top: 40px;
    padding: 20px;
    color: #7f8c8d;
    border-top: 1px solid #ddd;
}
</style>

</head>

<body>
    <div class="container">
        <!-- Navigation -->
        <div class="nav">
            <h1>📝 My Blog</h1>
            <div class="nav-right">
                {% if user.is_authenticated %}
                    <span class="welcome">👋 Welcome, {{ user.username }}!</span>
                    <a href="{% url 'create_post' %}" class="btn btn-primary" style="background: rgba(255,255,255,0.2);">+ New Post</a>
                    <form action="{% url 'logout' %}" method="POST" style="display: inline; margin: 0;">
                        {% csrf_token %}
                        <button type="submit" class="logout-btn">🚪 Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">🔑 Login</a>
                {% endif %}
            </div>
        </div>

        <!-- Content -->
        {% block content %}{% endblock %}
    </div>
</body>
</html>
