{% extends 'base.html' %}
{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My Blog{% endblock %}</title>
    <link rel="stylesheet" type="text/css" href="{% static 'posts/style.css' %}">
</head>
<style>
    /* ============================================
   GLOBAL STYLES (Sab Ke Liye Common)
   ============================================ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

/* ============================================
   NAVIGATION (Base)
   ============================================ */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 15px 25px;
    border-radius: 12px;
    color: white;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.nav h1 {
    font-size: 24px;
    margin: 0;
    color: white;
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 15px;
    flex-wrap: wrap;
}

.nav a {
    color: white;
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 8px;
    background: rgba(255,255,255,0.15);
    transition: background 0.3s;
    font-weight: 500;
}

.nav a:hover {
    background: rgba(255,255,255,0.3);
}

.nav .logout-btn {
    background: rgba(255, 0, 0, 0.3);
    border: none;
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
}

.nav .logout-btn:hover {
    background: rgba(255, 0, 0, 0.5);
}

.nav .welcome {
    color: white;
    font-weight: 500;
}

/* ============================================
   BUTTONS (Common)
   ============================================ */
.btn {
    display: inline-block;
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
}

.btn-primary {
    background: #667eea;
    color: white;
}
.btn-primary:hover { background: #5a67d8; }

.btn-success {
    background: #48bb78;
    color: white;
}
.btn-success:hover { background: #38a169; }

.btn-warning {
    background: #ed8936;
    color: white;
}
.btn-warning:hover { background: #dd6b20; }

.btn-danger {
    background: #fc8181;
    color: white;
}
.btn-danger:hover { background: #f56565; }

.btn-outline {
    background: transparent;
    color: #667eea;
    border: 2px solid #667eea;
}
.btn-outline:hover {
    background: #667eea;
    color: white;
}

/* ============================================
   SEARCH FORM (Home)
   ============================================ */
.search-form {
    display: flex;
    gap: 12px;
    margin: 20px 0 25px 0;
    flex-wrap: wrap;
}

.search-form input[type="text"] {
    flex: 1;
    padding: 10px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 16px;
    min-width: 150px;
}

.search-form select {
    padding: 10px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 16px;
    background: white;
    min-width: 130px;
}

.search-form button {
    padding: 10px 25px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
}

/* ============================================
   POST CARDS (Home)
   ============================================ */
.posts-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-top: 20px;
}

.post {
    background: white;
    padding: 20px 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    border-left: 5px solid #667eea;
    transition: transform 0.3s, box-shadow 0.3s;
}

.post:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

.post h2 {
    color: #333;
    font-size: 22px;
    margin-bottom: 8px;
}

.post .author {
    color: #667eea;
    font-weight: 600;
    font-size: 14px;
}

.post .content {
    color: #555;
    margin: 12px 0;
    line-height: 1.6;
}

.post .meta {
    color: #999;
    font-size: 13px;
    margin-bottom: 12px;
}

.post .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
}

/* ============================================
   PAGE TITLES (Common)
   ============================================ */
.page-title {
    color: #333;
    font-size: 28px;
    margin-bottom: 20px;
}

/* ============================================
   FORMS (Create, Edit, Delete)
   ============================================ */
/* Create/Edit Form */
form input, form textarea {
    width: 100%;
    padding: 12px 16px;
    margin: 8px 0 18px 0;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 16px;
    transition: border 0.3s;
}

form input:focus, form textarea:focus {
    outline: none;
    border-color: #667eea;
}

form label {
    font-weight: 600;
    color: #333;
    margin-top: 10px;
}

/* Delete Confirm */
.delete-box {
    text-align: center;
    padding: 40px 20px;
    background: #fff5f5;
    border-radius: 12px;
    border: 2px solid #fc8181;
}

.delete-box h1 {
    color: #e53e3e;
    font-size: 28px;
}

.delete-box .post-title {
    color: #333;
    font-size: 22px;
    font-weight: bold;
    background: white;
    padding: 10px 20px;
    border-radius: 8px;
    display: inline-block;
    margin: 15px 0;
}

.delete-box .warning {
    color: #e53e3e;
    font-weight: 500;
    margin: 15px 0;
}

.delete-box .actions {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
}

/* ============================================
   DETAIL PAGE
   ============================================ */
.detail-post {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    border-left: 5px solid #667eea;
}

.detail-post h1 {
    color: #333;
    font-size: 28px;
    margin-bottom: 8px;
}

.detail-post .author {
    color: #667eea;
    font-weight: 600;
    font-size: 16px;
}

.detail-post .meta {
    color: #999;
    font-size: 14px;
    margin: 8px 0 20px 0;
}

.detail-post .content {
    color: #444;
    font-size: 18px;
    line-height: 1.8;
    margin: 20px 0;
}

.detail-post .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 20px;
}

/* ============================================
   RESPONSIVE (Mobile)
   ============================================ */
@media (max-width: 600px) {
    .nav {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
    }
    
    .nav-right {
        justify-content: center;
        margin-top: 10px;
    }
    
    .post {
        padding: 15px;
    }
    
    .search-form {
        flex-direction: column;
    }
    
    .container {
        padding: 15px;
    }
}
</style>
<body>
    <div class="container">
        <!-- Navigation -->
        <div class="nav">
            <h1>📝 My Blog</h1>
            <div class="nav-right">
                {% if user.is_authenticated %}
                    <span class="welcome">👋 Welcome, {{ user.username }}!</span>
                    <a href="{% url 'create_post' %}" class="btn btn-primary" style="background: rgba(255,255,255,0.2);">+ New Post</a>
                    <form action="{% url 'logout' %}" method="POST" style="display: inline; margin: 0;">
                        {% csrf_token %}
                        <button type="submit" class="logout-btn">🚪 Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">🔑 Login</a>
                {% endif %}
            </div>
        </div>

        <!-- Content -->
        {% block content %}{% endblock %}
    </div>
</body>
</html>
