{% extends 'posts/base.html' %}

{% block title %}Create Post{% endblock %}

{% block content %}
    <h1>Create New Post</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Save Post</button>
    </form>
    <a href="{% url 'home' %}" class="btn">← Back</a>
{% endblock %}
