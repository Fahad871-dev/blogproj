<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>
    <style>
        /* ===== CREATE POST PAGE STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            padding: 40px 35px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .create-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .create-container h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 600;
        }

        .create-container form {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid #f0f0f0;
        }

        .create-container form label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        .create-container form input,
        .create-container form textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-sizing: border-box;
            background: #fafafa;
        }

        .create-container form input:focus,
        .create-container form textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background: white;
        }

        .create-container form textarea {
            min-height: 200px;
            resize: vertical;
        }

        .create-container .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .create-container .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 40px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .create-container .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .create-container .btn-cancel {
            background: #e2e8f0;
            color: #333;
            padding: 12px 35px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }

        .create-container .btn-cancel:hover {
            background: #cbd5e0;
        }

        .create-container .errorlist {
            color: #e53e3e;
            background: #fff5f5;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            margin: 5px 0 10px 0;
            list-style: none;
        }

        /* Navigation */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .nav h1 {
            font-size: 24px;
            margin: 0;
            color: white;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255,255,255,0.15);
            transition: background 0.3s;
            font-weight: 500;
        }

        .nav a:hover {
            background: rgba(255,255,255,0.3);
        }

        .nav .logout-btn {
            background: rgba(255, 0, 0, 0.3);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .nav .logout-btn:hover {
            background: rgba(255, 0, 0, 0.5);
        }

        .nav .welcome {
            color: white;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .create-container form {
                padding: 20px;
            }
            .create-container .form-actions {
                flex-direction: column;
            }
            .create-container .btn-save,
            .create-container .btn-cancel {
                width: 100%;
                text-align: center;
            }
            .container {
                padding: 20px;
            }
            .nav {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .nav-right {
                justify-content: center;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <div class="nav">
            <h1>📝 My Blog</h1>
            <div class="nav-right">
                {% if user.is_authenticated %}
                    <span class="welcome">👋 Welcome, {{ user.username }}!</span>
                    <a href="{% url 'create_post' %}" class="btn btn-primary" style="background: rgba(255,255,255,0.2);">+ New Post</a>
                    <form action="{% url 'logout' %}" method="POST" style="display: inline; margin: 0;">
                        {% csrf_token %}
                        <button type="submit" class="logout-btn">🚪 Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-primary">🔑 Login</a>
                {% endif %}
            </div>
        </div>

        <!-- Create Form -->
        <div class="create-container">
            <h2>✏️ Create New Post</h2>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="form-actions">
                    <button type="submit" class="btn-save">✅ Save Post</button>
                    <a href="{% url 'home' %}" class="btn-cancel">← Back</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
