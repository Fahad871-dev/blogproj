<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Post</title>
</head>
<body>
    <h1>Delete Post</h1>
    <p>Are you sure you want to delete <strong>"{{post.title}}"</strong>?</p>
    
     <form method="POST">   
        {% csrf_token %}
        <button type="submit" style="background: red; color: white; padding: 10px;">
            Yes Delete

        </button>

        <a href="{% url 'detail' pk=post.pk %}">Cancel</a>

     </form>

</body>
</html>
