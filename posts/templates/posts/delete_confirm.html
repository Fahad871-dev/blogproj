{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Post{% endblock %}

{% block content %}
<div class="delete-box">
    <h1>🗑️ Delete Post</h1>
    <p>Are you sure you want to delete <strong>"{{ post.title }}"</strong>?</p>
    <div class="warning">⚠️ This action cannot be undone!</div>
    
    <form method="POST">
        {% csrf_token %}
        <div class="actions">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
